x-airflow-common: &airflow-common
  build:
    context: ./docker/airflow
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__WEBSERVER__SECRET_KEY: local-dev-secret
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW_UID: 50000
    STOCK_DATA_DIR: /opt/airflow/data/stock_data
    MODEL_DIR: /opt/airflow/data/models
    COMBINED_STOCK_DATA_FILE: /opt/airflow/data/stock_data/combined_stock_data.csv
    FASTAPI_SCRIPT: /opt/airflow/api_server/fastapi_model_server.py
    MLFLOW_TRACKING_URI: http://mlflow:5001
    TWELVEDATA_API_KEY: ${TWELVEDATA_API_KEY:-}
    PYTHONPATH: /opt/airflow/common:/opt/airflow/dags:/opt/airflow/api_server
  volumes:
    - ./src/dag:/opt/airflow/dags
    - ./src/api_server:/opt/airflow/api_server
    - ./src/common:/opt/airflow/common
    - ./airflow-data:/opt/airflow/data
    - ./airflow-logs:/opt/airflow/logs
    - ./mlflow-data:/mlflow
  depends_on:
    postgres:
      condition: service_healthy
    mlflow:
      condition: service_started

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/data/stock_data /opt/airflow/data/models /opt/airflow/logs
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    ports:
      - "8000:8000"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  mlflow:
    build:
      context: ./docker/airflow
    command: >
      bash -c "mkdir -p /mlflow/mlruns /mlflow/artifacts &&
      mlflow server
      --host 0.0.0.0
      --port 5001
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts"
    volumes:
      - ./mlflow-data:/mlflow
    ports:
      - "5001:5001"
    restart: unless-stopped

volumes:
  postgres-db-volume:
